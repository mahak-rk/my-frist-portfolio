<!DOCTYPE html>
<html>
<head>
  <title>Div Tag</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 20px;
    }

    .title {
      text-align: center;
      color: black;
      text-decoration: underline;
    }

    .box {
      border: 5px dotted black;
      padding: 15px;
      background-color: white;
    }

    .country {
      border: 1px solid grey;
      padding: 10px;
      margin: 10px 0;
      background-color: #fafafa;
    }

    .name {
      color: blue;
    }

    .capital {
      color: dodgerblue;
    }
  </style>
</head>
<body>

  <h2 class="title">Information about capitals of 5 different countries</h2>

  <div class="box">
    <div class="country">
      <b class="name">1. India</b><br>
      <p>Its capital is <b class="capital">New Delhi.</b></p>
    </div>

    <div class="country">
      <b class="name">2. Pakistan</b><br>
      <p>Its capital is <b class="capital">Islamabad.</b></p>
    </div>

    <div class="country">
      <b class="name">3. Sri Lanka</b><br>
      <p>Its capital is <b class="capital">Colombo.</b></p>
    </div>

    <div class="country">
      <b class="name">4. Bhutan</b><br>
      <p>Its capital is <b class="capital">Thimphu.</b></p>
    </div>

    <div class="country">
      <b class="name">5. China</b><br>
      <p>Its capital is <b class="capital">Beijing.</b></p>
    </div>
  </div>

</body>
</html>
