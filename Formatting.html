<!DOCTYPE html>
<html>
<head>
  <title>Formatting tags</title>
</head>
<body>
  <h2>Example of formatting tags.</h2>
  <p>This is <b>bold text</b>, <i>italic text</i>, and <u>underline text</u>.</p>
  <p>You can also write in monospaced style using <tt>tt tag</tt>.</p>
  <p>Some words can be <big>bigger</big> or <small>smaller</small>.</p>
  <p>If you make a mistake, you can <strike>strike</strike> it out.</p>
  <p>Water is written as H<sub>2</sub>O and in maths we write X<sup>2</sup> + Y<sup>2</sup> = Z<sup>2</sup>.</p>
</body>
</html>
