<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <style>
    body {
      background-color: lightgrey;
    }

    table {
      margin: 50px auto;
      border-collapse: collapse;
      background-color: white;
    }

    td {
      width: 70px;
      height: 60px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      border: 2px solid black;
      cursor: pointer;
      transition: 0.3s;
    }

    .display {
      background-color: black;
      color: white;
      text-align: right;
      padding-right: 10px;
      font-size: 24px;
    }

    .num {
      background-color: lightblue;
    }

    .op {
      background-color: orange;
    }

    .equal {
      background-color: lightgreen;
    }

    .clear {
      background-color: lightcoral;
    }

    td:hover {
      background-color: lightyellow;
      color: red;
    }
  </style>
</head>
<body>
  <center>
    <h2>Calculator</h2>
    <table>
      <tr>
        <td colspan="4" class="display">0</td>
      </tr>
      <tr>
        <td class="num">7</td>
        <td class="num">8</td>
        <td class="num">9</td>
        <td class="op" rowspan="2">+</td>
      </tr>
      <tr>
        <td class="num">4</td>
        <td class="num">5</td>
        <td class="num">6</td>
      </tr>
      <tr>
        <td class="num">1</td>
        <td class="num">2</td>
        <td class="num">3</td>
        <td class="equal" rowspan="2">=</td>
      </tr>
      <tr>
        <td class="num">.</td>
        <td colspan="2" class="num">0</td>
      </tr>
      <tr>
        <td class="op">*</td>
        <td class="op">-</td>
        <td class="op">/</td>
        <td class="clear">CE</td>
      </tr>
    </table>
  </center>
</body>
</html>
