<!DOCTYPE html>
<html>
<head>
  <title>Time Table</title>
  <style>
    table, th, td {
      border: 5px groove pink;
      border-collapse: collapse;
      text-align: center;
      border-radius: 10px;
      padding: 8px;
    }
    h2 {
      border: 5px groove tomato;
      text-align: center;
      padding: 4px;
    }
  </style>
</head>
<body>
  <h2>This is the time table of my class.</h2>

  <center>
    <table>
      <tr>
        <th>Days</th>
        <th colspan="4">Subjects</th>
      </tr>
      <tr>
        <th>Monday</th>
        <td>Business Communication</td>
        <td>C Language</td>
        <td>FOC</td>
        <td>HTML</td>
      </tr>
      <tr>
        <th>Wednesday</th>
        <td>Business Communication</td>
        <td>C Language</td>
        <td>FOC</td>
        <td>-</td>
      </tr>
      <tr>
        <th>Thursday</th>
        <td>HTML</td>
        <td>Maths</td>
        <td>Business Communication</td>
        <td>Lab</td>
      </tr>
      <tr>
        <th>Friday</th>
        <td>HTML</td>
        <td>Maths</td>
        <td>Business Communication</td>
        <td>Lab</td>
      </tr>
      <tr>
        <th>Saturday</th>
        <td>HTML</td>
        <td>Maths</td>
        <td>Business Communication</td>
        <td>Lab</td>
      </tr>
    </table>
  </center>
</body>
</html>
