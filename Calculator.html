<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <style>
    table, th, td {
      border: 5px groove black;
      border-collapse: collapse;
      text-align: center;
      padding: 4px;
      font-weight: bold;
    }
    table {
      margin: auto;
    }
  </style>
</head>
<body>
  <center>
    <h2>Calculator</h2>
    <table>
      <tr>
        <td colspan="4" style="text-align: left;">0</td>
      </tr>
      <tr>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td rowspan="2">+</td>
      </tr>
      <tr>
        <td>4</td>
        <td>5</td>
        <td>6</td>
      </tr>
      <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td rowspan="2">=</td>
      </tr>
      <tr>
        <td>.</td>
        <td colspan="2">0</td>
      </tr>
      <tr>
        <td>*</td>
        <td>-</td>
        <td>/</td>
        <td>CE</td>
      </tr>
    </table>
  </center>
</body>
</html>
